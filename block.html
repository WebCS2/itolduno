<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Block Ctrl+U Example</title>
<script>
// Block Ctrl+U
document.addEventListener('keydown', function (event) {
    // Check if Ctrl (or Cmd on Mac) is pressed with "U"
    if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'u') {
        event.preventDefault(); // Stop default action
        alert('Viewing source is disabled on this page.');
    }
});
</script>
</head>
<body>
    <h1>Ctrl+U is blocked here</h1>
    <p>Try pressing Ctrl+U — it will be intercepted.</p>
</body>
</html>
